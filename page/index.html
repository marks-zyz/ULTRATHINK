<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Próxima Escolha — Descubra seu caminho</title>
  <meta name="description" content="Descubra qual decisão educacional faz sentido para o seu momento de vida.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --surface: #F7F8FC;
      --surface-raised: #FFFFFF;
      --surface-deep: #EEEEF5;
      --voice-loud: #1B1F3B;
      --voice-mid: #5D6180;
      --voice-quiet: #8E91AB;
      --pulse: #6C5CE7;
      --pulse-alt: #8577ED;
      --pulse-glow: rgba(108, 92, 231, 0.12);
      --green: #00C9A7;
      --green-glow: rgba(0, 201, 167, 0.12);
      --line: rgba(27, 31, 59, 0.07);
      --line-strong: rgba(27, 31, 59, 0.13);
      --font-alma: 'Space Grotesk', system-ui, sans-serif;
      --font-maquina: 'Space Mono', monospace;
      --font-ponte: 'Inter', system-ui, sans-serif;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-reveal: cubic-bezier(0.23, 1, 0.32, 1);
      --radius: 8px;
      --radius-m: 12px;
      --radius-l: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-ponte);
      background: var(--surface);
      color: var(--voice-loud);
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100dvh;
    }

    button, input { font: inherit; }
    a { color: inherit; text-decoration: none; }

    /* ═══════════════════════════════════════
       NAV
    ═══════════════════════════════════════ */
    .marks___nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 clamp(16px, 4vw, 40px);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--line);
      transition: border-color 0.4s;
    }

    .marks___logo {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .marks___logo-icon {
      width: 24px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .marks___logo-text {
      font-family: var(--font-alma);
      font-size: 1.1rem;
      letter-spacing: -0.03em;
      font-weight: 700;
    }

    .marks___logo-text span {
      color: var(--pulse);
    }

    .marks___nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .marks___nav-chip {
      font-family: var(--font-maquina);
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      color: var(--voice-quiet);
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      display: none;
    }

    .marks___nav-btn {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--surface-raised);
      color: var(--voice-mid);
      font-family: var(--font-maquina);
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      padding: 6px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.3s var(--ease-out);
    }

    .marks___nav-btn:hover {
      border-color: var(--pulse);
      color: var(--pulse);
    }

    /* ═══════════════════════════════════════
       PROGRESS BAR
    ═══════════════════════════════════════ */
    .marks___progress {
      position: fixed;
      top: 56px;
      left: 0; right: 0;
      height: 3px;
      background: var(--line);
      z-index: 99;
    }

    .marks___progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pulse), var(--green));
      border-radius: 0 2px 2px 0;
      transition: width 0.5s var(--ease-out);
    }

    /* ═══════════════════════════════════════
       SCREEN CONTAINER
    ═══════════════════════════════════════ */
    .marks___screen {
      min-height: 100dvh;
      padding: 56px 0 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: marks___fadeUp 0.4s var(--ease-reveal);
      position: relative;
      overflow: hidden;
    }

    .marks___screen-inner {
      width: min(720px, calc(100% - 48px));
      padding: 20px 0;
      position: relative;
      z-index: 1;
    }

    .marks___screen-wide {
      width: min(960px, calc(100% - 48px));
    }

    /* ═══════════════════════════════════════
       WATERMARK ICON
    ═══════════════════════════════════════ */
    .marks___watermark {
      position: absolute;
      bottom: -40px;
      right: -40px;
      width: 340px;
      height: 340px;
      opacity: 0.04;
      pointer-events: none;
      z-index: 0;
      color: var(--voice-loud);
      animation: marks___watermarkIn 0.8s var(--ease-reveal);
    }

    .marks___watermark svg {
      width: 100%;
      height: 100%;
    }

    @keyframes marks___watermarkIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 0.04; transform: scale(1); }
    }

    @media (max-width: 640px) {
      .marks___watermark {
        width: 240px;
        height: 240px;
        bottom: -20px;
        right: -20px;
      }
    }

    /* ═══════════════════════════════════════
       TYPOGRAPHY
    ═══════════════════════════════════════ */
    .marks___kicker {
      font-family: var(--font-maquina);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--voice-quiet);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .marks___kicker-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--pulse);
      animation: marks___blink 2.4s ease-in-out infinite;
    }

    .marks___headline {
      font-family: var(--font-alma);
      font-size: clamp(1.8rem, 4.5vw, 2.8rem);
      line-height: 1.12;
      letter-spacing: -0.03em;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .marks___headline em {
      font-style: normal;
      color: var(--pulse);
      position: relative;
    }

    .marks___headline em::after {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 3px;
      border-radius: 2px;
      background: var(--pulse);
      opacity: 0.35;
    }

    .marks___subline {
      font-size: clamp(1rem, 1.5vw, 1.12rem);
      color: var(--voice-mid);
      max-width: 52ch;
      line-height: 1.65;
      font-weight: 300;
    }

    /* ═══════════════════════════════════════
       HERO / LANDING
    ═══════════════════════════════════════ */
    .marks___hero-metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      margin-top: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius-m);
      overflow: hidden;
      background: var(--line);
    }

    .marks___hero-metric {
      padding: 20px;
      background: var(--surface-raised);
    }

    .marks___hero-metric strong {
      display: block;
      font-family: var(--font-alma);
      font-size: 1.5rem;
      line-height: 1;
      margin-bottom: 6px;
      font-weight: 700;
      color: var(--pulse);
    }

    .marks___hero-metric span {
      font-size: 0.85rem;
      color: var(--voice-mid);
      line-height: 1.4;
    }

    .marks___hero-actions {
      margin-top: 36px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* ═══════════════════════════════════════
       BUTTONS
    ═══════════════════════════════════════ */
    .marks___btn-primary {
      appearance: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 48px;
      padding: 0 24px;
      border: none;
      border-radius: var(--radius-m);
      background: var(--pulse);
      color: #fff;
      font-family: var(--font-alma);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: all 0.3s var(--ease-out);
      box-shadow: 0 4px 16px rgba(108, 92, 231, 0.25);
    }

    .marks___btn-primary:hover {
      background: var(--pulse-alt);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(108, 92, 231, 0.3);
    }

    .marks___btn-primary svg {
      transition: transform 0.3s var(--ease-out);
    }
    .marks___btn-primary:hover svg {
      transform: translateX(3px);
    }

    .marks___btn-ghost {
      appearance: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 48px;
      padding: 0 20px;
      border: 1.5px solid var(--line-strong);
      border-radius: var(--radius-m);
      background: transparent;
      color: var(--voice-mid);
      font-family: var(--font-alma);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s var(--ease-out);
    }

    .marks___btn-ghost:hover {
      border-color: var(--pulse);
      color: var(--pulse);
    }

    .marks___btn-back {
      appearance: none;
      border: none;
      background: transparent;
      color: var(--voice-quiet);
      font-family: var(--font-maquina);
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      padding: 8px 0;
      transition: color 0.3s;
    }

    .marks___btn-back:hover { color: var(--voice-loud); }

    /* ═══════════════════════════════════════
       OPTIONS GRID (QUIZ)
    ═══════════════════════════════════════ */
    .marks___options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 32px;
    }

    .marks___option {
      appearance: none;
      position: relative;
      text-align: left;
      padding: 20px;
      border: 1.5px solid var(--line);
      border-radius: var(--radius-m);
      background: var(--surface-raised);
      color: var(--voice-loud);
      cursor: pointer;
      transition: all 0.3s var(--ease-out);
      min-height: 90px;
    }

    .marks___option:hover {
      border-color: var(--pulse);
      background: color-mix(in srgb, var(--pulse) 4%, var(--surface-raised));
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(108, 92, 231, 0.1);
    }

    .marks___option:active {
      transform: translateY(-1px);
      background: color-mix(in srgb, var(--pulse) 8%, var(--surface-raised));
      transition-duration: 0.1s;
    }

    .marks___option strong {
      display: block;
      font-family: var(--font-alma);
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .marks___option span {
      display: block;
      font-size: 0.84rem;
      color: var(--voice-mid);
      line-height: 1.45;
    }

    /* ═══════════════════════════════════════
       FORM (CAPTURE)
    ═══════════════════════════════════════ */
    .marks___form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 28px;
    }

    .marks___field {
      display: grid;
      gap: 6px;
    }

    .marks___field.marks___full { grid-column: 1 / -1; }

    .marks___field label {
      font-family: var(--font-maquina);
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--voice-quiet);
    }

    .marks___field input {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface-raised);
      color: var(--voice-loud);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .marks___field input:focus {
      border-color: var(--pulse);
      box-shadow: 0 0 0 3px var(--pulse-glow);
    }

    .marks___field input::placeholder {
      color: var(--voice-quiet);
    }

    .marks___form-footer {
      margin-top: 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .marks___fineprint {
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--voice-quiet);
      line-height: 1.55;
      max-width: 56ch;
    }

    .marks___error {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: var(--radius);
      background: rgba(230, 57, 70, 0.08);
      border: 1px solid rgba(230, 57, 70, 0.16);
      color: #a62633;
      font-size: 0.88rem;
    }

    /* ═══════════════════════════════════════
       ANALYSIS
    ═══════════════════════════════════════ */
    .marks___analysis {
      text-align: center;
      display: grid;
      place-items: center;
      gap: 28px;
      min-height: calc(100dvh - 100px);
    }

    .marks___analysis-spinner {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 0%, #6C5CE7 40%, #00C9A7 70%, transparent 100%);
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 3.5px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 3.5px));
      animation: marks___spin 1s linear infinite;
    }

    .marks___analysis-text strong {
      display: block;
      font-family: var(--font-alma);
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .marks___analysis-text p {
      color: var(--voice-mid);
      font-size: 0.95rem;
      max-width: 40ch;
      margin: 0 auto;
    }

    .marks___analysis-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .marks___analysis-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--voice-quiet);
      animation: marks___pulse 1.2s ease infinite;
    }
    .marks___analysis-dots span:nth-child(2) { animation-delay: 0.15s; }
    .marks___analysis-dots span:nth-child(3) { animation-delay: 0.3s; }

    /* ═══════════════════════════════════════
       RESULT
    ═══════════════════════════════════════ */
    .marks___result-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .marks___pill {
      font-family: var(--font-maquina);
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      padding: 5px 10px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      color: var(--voice-mid);
    }

    .marks___pill--hot {
      background: rgba(255, 71, 87, 0.1);
      border-color: rgba(255, 71, 87, 0.2);
      color: #e63946;
    }

    .marks___pill--warm {
      background: rgba(255, 159, 67, 0.1);
      border-color: rgba(255, 159, 67, 0.2);
      color: #c96a1c;
    }

    .marks___pill--cold {
      background: rgba(0, 201, 167, 0.1);
      border-color: rgba(0, 201, 167, 0.2);
      color: #00a88c;
    }

    .marks___result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 24px;
    }

    .marks___result-card {
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius-m);
      background: var(--surface-raised);
    }

    .marks___result-card strong {
      display: block;
      font-family: var(--font-alma);
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .marks___result-card p {
      margin: 0;
      font-size: 0.88rem;
      color: var(--voice-mid);
      line-height: 1.5;
    }

    .marks___result-reasons {
      margin-top: 24px;
      display: grid;
      gap: 10px;
    }

    .marks___reason {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 14px;
      border-radius: var(--radius);
      background: var(--surface-deep);
    }

    .marks___reason-icon {
      flex: 0 0 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--green-glow);
      display: grid;
      place-items: center;
      color: var(--green);
    }

    .marks___reason p {
      margin: 0;
      font-size: 0.88rem;
      color: var(--voice-mid);
      line-height: 1.5;
    }

    .marks___result-actions {
      margin-top: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    /* ═══════════════════════════════════════
       RESULT REPORT (scrollable)
    ═══════════════════════════════════════ */
    .marks___report {
      min-height: auto;
      align-items: flex-start;
      padding-top: 72px;
      padding-bottom: 40px;
    }

    .marks___report .marks___screen-inner {
      padding: 0;
    }

    .marks___report-hero {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 32px;
      align-items: center;
      padding-bottom: 40px;
      border-bottom: 1px solid var(--line);
    }

    .marks___radar-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .marks___radar-wrap svg {
      width: 100%;
      max-width: 340px;
    }

    /* ═══════════════════════════════════════
       MARKET INSIGHT CARD (3D tilt)
    ═══════════════════════════════════════ */
    .marks___market-perspective {
      perspective: 800px;
      margin-top: 16px;
    }

    .marks___market-card {
      position: relative;
      padding: 24px;
      border-radius: var(--radius-m);
      background: linear-gradient(145deg, #1B1F3B, #252A4A);
      color: #F7F8FC;
      overflow: hidden;
      transform-style: preserve-3d;
      transition: transform 0.15s ease-out;
      will-change: transform;
      cursor: default;
    }

    .marks___market-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(
        circle at var(--mx, 50%) var(--my, 50%),
        rgba(255,255,255,0.08) 0%,
        transparent 60%
      );
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .marks___market-card:hover::before {
      opacity: 1;
    }

    .marks___market-shine {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        transparent 40%,
        rgba(255,255,255,0.03) 45%,
        rgba(255,255,255,0.06) 50%,
        rgba(255,255,255,0.03) 55%,
        transparent 60%
      );
      background-size: 200% 200%;
      background-position: var(--shine, 100% 0%);
      pointer-events: none;
      transition: background-position 0.15s ease-out;
    }

    .marks___market-label {
      font-family: var(--font-maquina);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(247,248,252,0.4);
      margin-bottom: 10px;
    }

    .marks___market-title {
      font-family: var(--font-alma);
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 16px;
    }

    .marks___market-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .marks___market-stat {
      padding: 10px;
      border-radius: var(--radius);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .marks___market-stat strong {
      display: block;
      font-family: var(--font-alma);
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 3px;
    }

    .marks___market-stat span {
      font-size: 0.68rem;
      color: rgba(247,248,252,0.5);
      line-height: 1.3;
    }

    .marks___market-foot {
      margin-top: 12px;
      font-size: 0.72rem;
      color: rgba(247,248,252,0.35);
      line-height: 1.45;
    }

    .marks___report-section {
      padding: 36px 0;
      border-bottom: 1px solid var(--line);
    }

    .marks___report-section:last-of-type {
      border-bottom: none;
    }

    .marks___report-label {
      font-family: var(--font-maquina);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--voice-quiet);
      margin-bottom: 14px;
    }

    .marks___report-title {
      font-family: var(--font-alma);
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 10px;
    }

    .marks___report-body {
      font-size: 0.95rem;
      color: var(--voice-mid);
      line-height: 1.7;
      max-width: 64ch;
    }

    .marks___report-body strong {
      color: var(--voice-loud);
      font-weight: 600;
    }

    .marks___report-highlight {
      margin-top: 20px;
      padding: 24px;
      border-radius: var(--radius-m);
      background: linear-gradient(135deg, color-mix(in srgb, var(--pulse) 5%, var(--surface-raised)), color-mix(in srgb, var(--green) 3%, var(--surface-raised)));
      border: 1.5px solid color-mix(in srgb, var(--pulse) 10%, transparent);
    }

    .marks___report-courses {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;

      font-size: 0.8rem;
      color: var(--voice-mid);
      line-height: 1.4;
    }

    .marks___oc-note {
      font-size: 0.76rem;
      color: var(--voice-quiet);
      line-height: 1.5;
      padding-top: 8px;
      border-top: 1px solid var(--line);
    }

    /* ═══════════════════════════════════════
       QUIZ SUMMARY (off-canvas lightweight)
    ═══════════════════════════════════════ */
    .marks___summary-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

      height: 24px;
      border-radius: 50%;

      font-size: 0.85rem;
      font-weight: 600;
      color: var(--voice-loud);

    ═══════════════════════════════════════ */

      margin-top: 32px;

      justify-content: space-between;

    ═══════════════════════════════════════ */

    }

      0%, 100% { opacity: 1; }

    }

    @keyframes marks___spin {

    @keyframes marks___pulse {

    function getOptionLabel(stepId, value) {
      const q = getQuestionConfig(stepId);
      if (!q) return "";
      const o = q.options.find(i => i.value === value);
      return o ? o.label : "";
    }

    function getSummaryEntries() {
      return steps.filter(s => state.answers[s]).map((s, i) => ({
        index: i + 1,
        title: getQuestionConfig(s).title.replace(/\n/g, " "),
        value: getOptionLabel(s, state.answers[s])
      }));
    }

    function formatPhone(v) {
      const d = v.replace(/\D/g, "").slice(0, 11);
      if (d.length <= 2) return d;
      if (d.length <= 7) return `(${d.slice(0,2)}) ${d.slice(2)}`;
      return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
    }

    function esc(v) { return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

    /* ═══════════════════════════════════════
       LEAD SCORING (kept from original)
    ═══════════════════════════════════════ */
    function deriveLeadModel() {
      const a = state.answers;
      const area = areaMeta[a.area];
      const mk = a.mode || "undecided";
      const courses = area.courses[mk] || area.courses.undecided;

      let score=12, urgency=28, clarity=34, fit=42, readiness=30;
      const tags=[], reasons=[];

      if(a.goal==="switch_course"){score+=18;urgency+=16;readiness+=12;tags.push("Troca de curso");reasons.push("Sinal claro de redirecionamento acadêmico.")}
      if(a.goal==="second_degree"){score+=21;urgency+=10;clarity+=8;readiness+=15;tags.push("Segunda graduação");reasons.push("Motivação pragmática orientada a evolução profissional.")}
      if(a.goal==="return_studies"){score+=14;fit+=8;tags.push("Retomada dos estudos");reasons.push("Histórico de pausa e necessidade de retomada assistida.")}

      const mw={wrong_fit:{score:12,urgency:14,readiness:8,tag:"Escolha desalinhada",reason:"Reconhece desalinhamento com a escolha atual."},close_to_dropout:{score:18,urgency:22,readiness:10,tag:"Risco de evasão",reason:"Risco de evasão se não houver rota clara."},comparing_better_option:{score:9,urgency:8,readiness:8,tag:"Comparando alternativa",reason:"Intenção real, fase comparativa."},career_acceleration:{score:16,urgency:10,readiness:14,tag:"Aceleração de carreira",reason:"Meta profissional objetiva."},salary_growth:{score:14,urgency:8,readiness:13,tag:"Crescimento salarial",reason:"Foco em retorno profissional."},new_area:{score:12,urgency:9,readiness:10,tag:"Migração de área",reason:"Aberto a recomeçar."},return_after_pause:{score:10,urgency:7,readiness:8,tag:"Retomada após pausa",reason:"Precisa de confiança para reentrar."},routine_fit:{score:11,urgency:9,fit:8,tag:"Rotina apertada",reason:"Compatibilidade com dia a dia é decisiva."},insecure_restart:{score:6,urgency:5,clarity:-4,tag:"Insegurança",reason:"Interesse mas confiança baixa."}};
      const mm=mw[a.moment];
      if(mm){score+=mm.score||0;urgency+=mm.urgency||0;clarity+=mm.clarity||0;fit+=mm.fit||0;readiness+=mm.readiness||0;tags.push(mm.tag);reasons.push(mm.reason)}

      if(a.mode==="digital"){score+=8;fit+=8;clarity+=6;tags.push("Busca flexibilidade")}
      if(a.mode==="hybrid"){score+=9;fit+=9;clarity+=8;tags.push("Equilíbrio presença/flex")}
      if(a.mode==="presential"){score+=7;fit+=10;clarity+=7;tags.push("Valoriza presencial")}
      if(a.mode==="undecided"){score+=2;clarity-=4;tags.push("Formato indefinido");reasons.push("Indefinição sobre formato.")}

      const bw={time:{score:8,fit:10,clarity:4,tag:"Objeção: tempo",reason:"Proposta precisa ancorar flexibilidade."},money:{score:7,readiness:4,tag:"Objeção: investimento",reason:"Necessidade de conversa financeira."},employability:{score:13,urgency:10,readiness:12,tag:"Busca empregabilidade",reason:"Quer retorno profissional claro."},doubt:{score:4,clarity:-6,tag:"Precisa orientação",reason:"Próximo passo ideal é consultivo."}};
      const bm=bw[a.barrier];
      if(bm){score+=bm.score||0;urgency+=bm.urgency||0;clarity+=bm.clarity||0;fit+=bm.fit||0;readiness+=bm.readiness||0;tags.push(bm.tag);reasons.push(bm.reason)}

      if(a.timeframe==="now"){score+=22;urgency+=18;readiness+=22;tags.push("Janela imediata");reasons.push("Sinal de ação no curto prazo.")}
      if(a.timeframe==="three_months"){score+=12;urgency+=10;readiness+=10;tags.push("Janela 3 meses")}
      if(a.timeframe==="researching"){score+=3;clarity-=4;readiness-=6;tags.push("Fase de pesquisa");reasons.push("Responde melhor a valor e orientação.")}
      if(a.city){score+=6;readiness+=6;tags.push(`Praça: ${cityMeta[a.city]}`)}
      if(state.lead.email&&state.lead.phone){score+=6;readiness+=6}

      score=Math.max(18,Math.min(98,score));urgency=Math.max(24,Math.min(98,urgency));clarity=Math.max(18,Math.min(94,clarity));fit=Math.max(32,Math.min(95,fit));readiness=Math.max(20,Math.min(97,readiness));

      let temperature="Frio",stage="Lead em nutrição",nextAction="Enviar guia comparativo e conteúdo de orientação.",CTA="Receber trilha personalizada",responseTime="Até 24h";
      if(score>=86||(a.timeframe==="now"&&urgency>=70)){temperature="Quente";stage="SQL imediato";nextAction="Acionar especialista por WhatsApp em até 15 min.";CTA="Falar com especialista";responseTime="Até 15 min"}
      else if(score>=65){temperature="Morno";stage="MQL priorizado";nextAction="Disparar opções aderentes com abordagem consultiva.";CTA="Receber opções aderentes";responseTime="No mesmo dia"}

      const ba={time:"Enfatizar flexibilidade e formatos compatíveis com vida adulta.",money:"Apresentar viabilidade e argumentos de retorno.",employability:"Puxar conversa para carreira e caminhos profissionais.",doubt:"Atendimento consultivo antes de vender."}[a.barrier];

      const recs=[courses[0],courses[1],a.mode==="presential"?"Experiência com contato e rotina":"Formato com aderência à rotina"];
      const adminSummary=temperature==="Quente"?"Lead com alta intenção e sinais de urgência para abordagem rápida.":temperature==="Morno"?"Boa aderência, precisa de reforço de confiança e contexto.":"Fase de descoberta, indicado para nutrição guiada.";

      return{score,urgency,clarity,fit,readiness,temperature,stage,nextAction,barrierAction:ba,CTA,responseTime,area,recommendations:recs,reasons:[...new Set(reasons)].slice(0,5),tags:[...new Set(tags)].slice(0,8),adminSummary,asset:area.asset,city:cityMeta[a.city],modeLabel:getOptionLabel("mode",a.mode),barrierLabel:getOptionLabel("barrier",a.barrier)};
    }

    function updateNav() {
      const chip = document.getElementById("marks___stepChip");
      const sumBtn = document.getElementById("marks___toggleSummary");
      const admBtn = document.getElementById("marks___toggleAdmin");
      const isComplete = ["result","thankyou"].includes(state.screen);
      const hasAnswers = Object.keys(state.answers).length > 0;

      if (state.screen === "landing") {
        chip.style.display = "none";
        sumBtn.style.display = "none";
        admBtn.style.display = "none";
      } else if (state.screen === "quiz") {
        chip.textContent = `${state.stepIndex + 1} / 7`;
        chip.style.display = "";
        sumBtn.style.display = state.stepIndex > 0 ? "" : "none";
        admBtn.style.display = "";
      } else if (state.screen === "capture") {
        chip.textContent = "Dados de contato";
        chip.style.display = "";
        sumBtn.style.display = "";
        admBtn.style.display = "";
      } else if (state.screen === "analysis") {
        chip.textContent = "Analisando…";
        chip.style.display = "";
        sumBtn.style.display = "none";
        admBtn.style.display = "none";
      } else {
        chip.style.display = "none";
        sumBtn.style.display = "";
        admBtn.style.display = "";
      }

      // Mobile: hide nav actions until complete
      sumBtn.classList.toggle("marks___desktop-only", !isComplete);
      admBtn.classList.toggle("marks___desktop-only", !isComplete);

      // Progress
      let pct = 0;
      if (state.screen === "quiz") pct = ((state.stepIndex) / (steps.length + 1)) * 100;
      else if (state.screen === "capture") pct = (steps.length / (steps.length + 1)) * 100;
      else if (["analysis","result","thankyou"].includes(state.screen)) pct = 100;
      document.getElementById("marks___progressBar").style.width = pct + "%";
    }

    function buildRadar(dims) {
      // dims = [{label, value, color}] — 5 axes pentagon
      const cx = 180, cy = 170, R = 115;
      const n = dims.length;
      const angleStep = (Math.PI * 2) / n;
      const startAngle = -Math.PI / 2;
      const colors = ["#6C5CE7","#00C9A7","#FF6B6B","#FDCB6E","#A29BFE"];

      function pt(i, r) {
        const a = startAngle + i * angleStep;
        return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
      }

      function polygon(r) {
        return dims.map((_, i) => pt(i, r).join(",")).join(" ");
      }

      const gridLevels = [0.25, 0.5, 0.75, 1];
      let svg = `<svg viewBox="0 0 360 340" xmlns="http://www.w3.org/2000/svg">`;

      // Defs: gradients for each segment
      svg += `<defs>`;
      for (let i = 0; i < n; i++) {
        const ni = (i + 1) % n;
        const [x1, y1] = pt(i, R * dims[i].value / 100);
        const [x2, y2] = pt(ni, R * dims[ni].value / 100);
        svg += `<linearGradient id="rg${i}" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" gradientUnits="userSpaceOnUse">`;
        svg += `<stop offset="0%" stop-color="${colors[i]}"/>`;
        svg += `<stop offset="100%" stop-color="${colors[ni]}"/>`;
        svg += `</linearGradient>`;
        svg += `<linearGradient id="rs${i}" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" gradientUnits="userSpaceOnUse">`;
        svg += `<stop offset="0%" stop-color="${colors[i]}" stop-opacity="0.18"/>`;
        svg += `<stop offset="100%" stop-color="${colors[ni]}" stop-opacity="0.18"/>`;
        svg += `</linearGradient>`;
      }
      svg += `</defs>`;

      // Grid pentagons
      gridLevels.forEach(l => {
        svg += `<polygon points="${polygon(R * l)}" fill="none" stroke="var(--line)" stroke-width="0.8"/>`;
      });

      // Axes
      dims.forEach((_, i) => {
        const [x, y] = pt(i, R);
        svg += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="var(--line)" stroke-width="0.8"/>`;
      });

      // Fill: triangular segments with gradient
      for (let i = 0; i < n; i++) {
        const ni = (i + 1) % n;
        const [x1, y1] = pt(i, R * dims[i].value / 100);
        const [x2, y2] = pt(ni, R * dims[ni].value / 100);
        svg += `<path d="M${cx},${cy} L${x1},${y1} L${x2},${y2} Z" fill="url(#rs${i})" />`;
      }

      // Stroke: gradient edges
      for (let i = 0; i < n; i++) {
        const ni = (i + 1) % n;
        const [x1, y1] = pt(i, R * dims[i].value / 100);
        const [x2, y2] = pt(ni, R * dims[ni].value / 100);
        svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="url(#rg${i})" stroke-width="2.5" stroke-linecap="round"/>`;
      }

      // Dots on vertices
      dims.forEach((d, i) => {
        const [x, y] = pt(i, R * d.value / 100);
        svg += `<circle cx="${x}" cy="${y}" r="5" fill="${colors[i]}" stroke="var(--surface-raised)" stroke-width="2.5"/>`;
      });

      // Labels
      dims.forEach((d, i) => {
        const [x, y] = pt(i, R + 28);
        const anchor = x < cx - 20 ? "end" : x > cx + 20 ? "start" : "middle";
        const dy = y < cy - 40 ? -4 : y > cy + 40 ? 4 : 0;
        svg += `<text x="${x}" y="${y + dy}" text-anchor="${anchor}" dominant-baseline="central" font-family="var(--font-maquina)" font-size="8" letter-spacing="0.06em" fill="var(--voice-quiet)">${d.label}</text>`;
        svg += `<text x="${x}" y="${y + dy + 14}" text-anchor="${anchor}" dominant-baseline="central" font-family="var(--font-alma)" font-size="15" font-weight="700" fill="${colors[i]}">${d.value}</text>`;
      });

      svg += `</svg>`;
      return svg;
    }

                state.answers.area === "health" ? "laboratory with natural light and modern equipment" :
                "creative brainstorming session colorful sticky notes glass wall"
              )}?style=photographic&seed=3" alt="" loading="lazy" />
              <div class="marks___cta-overlay"></div>

              <div style="position:relative;z-index:1;max-width:66%;">
                <div style="font-family:var(--font-maquina);font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(247,248,252,0.4);margin-bottom:16px;">Próximo passo</div>
                <div style="font-family:var(--font-alma);font-size:clamp(2rem,4vw,3rem);font-weight:700;line-height:1.1;letter-spacing:-0.03em;margin-bottom:20px;">Quer transformar esse diagnóstico em ação?</div>
                <p style="color:rgba(247,248,252,0.6);font-size:1.05rem;line-height:1.65;margin-bottom:32px;">Um especialista pode montar uma rota sob medida com base em tudo que você compartilhou aqui. Sem compromisso e sem pressão — só uma conversa que pode mudar o rumo da sua próxima decisão educacional.</p>
                <button class="marks___btn-primary" data-action="go-thankyou" style="font-size:1rem;height:56px;padding:0 32px;">
                  Quero minha rota personalizada
                  <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
              </div>
            </div>

            <div style="margin-top:24px;text-align:center;">
              <button class="marks___btn-back" data-action="restart-demo">&larr; Testar com outro perfil</button>
            </div>

          </div>
        </div>
      `;

      // 3D tilt effect on market card
      requestAnimationFrame(() => {
        const card = document.getElementById("marks___marketCard");
        if (!card) return;

        card.addEventListener("mousemove", (e) => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const centerX = rect.width / 2;
          const centerY = rect.height / 2;
          const rotateX = ((y - centerY) / centerY) * -8;
          const rotateY = ((x - centerX) / centerX) * 8;
          const pctX = Math.round((x / rect.width) * 100);
          const pctY = Math.round((y / rect.height) * 100);
          const shinePosX = Math.round((x / rect.width) * 100);

          card.style.transform = "rotateX(" + rotateX + "deg) rotateY(" + rotateY + "deg) scale(1.02)";
          card.style.setProperty("--mx", pctX + "%");
          card.style.setProperty("--my", pctY + "%");
          card.querySelector(".marks___market-shine").style.backgroundPosition = shinePosX + "% 50%";
        });

        card.addEventListener("mouseleave", () => {
          card.style.transform = "rotateX(0) rotateY(0) scale(1)";
          card.querySelector(".marks___market-shine").style.backgroundPosition = "100% 0%";
        });
      });
    }

    function renderThankYou() {
      const r = state.result;
      app.innerHTML = `
        <div class="marks___screen">
          ${watermark("thankyou")}
          <div class="marks___screen-inner">
            <div style="text-align:center;">
              <div style="display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:50%;background:var(--green-glow);margin-bottom:20px;">
                <svg width="28" height="28" viewBox="0 0 16 16" fill="none"><path d="M3 8.4L6.1 11.5L13 4.6" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
              <div class="marks___kicker" style="justify-content:center;"><span class="marks___kicker-dot"></span>Tudo certo</div>
              <h1 class="marks___headline" style="max-width:16ch;margin:0 auto 16px;">Sua <em>rota</em> está sendo preparada.</h1>
              <p class="marks___subline" style="margin:0 auto;">Um especialista vai entrar em contato ${r.responseTime.toLowerCase()} com sugestões personalizadas para o seu momento. Fique de olho no WhatsApp.</p>
            </div>

            <div class="marks___thankyou-grid" style="margin-top:32px;">
              <div class="marks___result-card" style="text-align:center;">
                <strong>O que você contou</strong>
                <p>Interesse em ${r.area.label.toLowerCase()}, formato ${r.modeLabel.toLowerCase()}, em ${r.city}.</p>
              </div>
              <div class="marks___result-card" style="text-align:center;">
                <strong>O que preparamos</strong>
                <p>Uma recomendação com trilhas, formato e próximos passos sob medida para você.</p>
              </div>
            </div>

            <div class="marks___result-actions" style="margin-top:28px;justify-content:center;">
              <button class="marks___btn-back" data-action="restart-demo">&larr; Testar com outro perfil</button>
            </div>
          </div>
        </div>
      `;
    }

    /* ═══════════════════════════════════════
       EVENT HANDLING
    ═══════════════════════════════════════ */
    function startAnalysis() {
      if (state.analysisTimer) clearInterval(state.analysisTimer);
      state.analysisIndex = 0;
      state.screen = "analysis";
      render();

      state.analysisTimer = setInterval(() => {
        if (state.analysisIndex < analysisMessages.length - 1) {
          state.analysisIndex++;
          renderAnalysis();
          return;
        }
        clearInterval(state.analysisTimer);
        state.analysisTimer = null;
        state.result = deriveLeadModel();
        state.screen = "result";
        render();
      }, 1100);
    }

    function resetDemo() {
      if (state.analysisTimer) { clearInterval(state.analysisTimer); state.analysisTimer = null; }
      state.screen = "landing";
      state.stepIndex = 0;
      state.answers = {};
      state.lead = { name: "", email: "", phone: "" };
      state.formError = "";
      state.analysisIndex = 0;
      state.submittedAt = null;
      state.result = null;
      render();
    }

    document.addEventListener("click", e => {
      const t = e.target.closest("[data-action]");
      if (!t) return;
      const a = t.dataset.action;

      if (a === "start-demo") { state.screen = "quiz"; state.stepIndex = 0; render(); }
      else if (a === "answer") {
        state.answers[t.dataset.step] = t.dataset.value;
        state.formError = "";
        if (state.stepIndex >= steps.length - 1) state.screen = "capture";
        else state.stepIndex++;
        render();
      }
      else if (a === "prev-step") {
        if (state.screen === "capture") { state.screen = "quiz"; state.stepIndex = steps.length - 1; }
        else state.stepIndex = Math.max(0, state.stepIndex - 1);
        render();
      }
      else if (a === "back-landing") { state.screen = "landing"; render(); }
      else if (a === "go-thankyou") { state.screen = "thankyou"; render(); }
      else if (a === "toggle-summary") toggleSummary();
      else if (a === "close-summary") toggleSummary(false);
      else if (a === "toggle-admin") toggleAdmin();
      else if (a === "close-admin") toggleAdmin(false);
      else if (a === "submit-lead") {
        const nameEl = document.getElementById("lead-name");
        const phoneEl = document.getElementById("lead-phone");
        const emailEl = document.getElementById("lead-email");
        if (!nameEl || !emailEl || !phoneEl) return;

        const name = nameEl.value.trim();
        const email = emailEl.value.trim();
        const phone = formatPhone(phoneEl.value.trim());
        const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        const digits = phone.replace(/\D/g,"");

        if (name.length < 3 || !emailOk || digits.length < 10) {
          state.formError = "Preencha nome, e-mail válido e WhatsApp com DDD.";
          state.lead = { name, email, phone };
          renderCapture(); updateNav();
          return;
        }
        state.lead = { name, email, phone };
        state.formError = "";
        state.submittedAt = new Date();
        startAnalysis();
      }
      else if (a === "restart-demo" || a === "reset-demo") resetDemo();
    });

    // Summary backdrop click
    document.getElementById("marks___summaryBackdrop").addEventListener("click", () => toggleSummary(false));
    document.getElementById("marks___adminBackdrop").addEventListener("click", () => toggleAdmin(false));

    document.addEventListener("input", e => {
      if (e.target.id === "lead-phone") e.target.value = formatPhone(e.target.value);
    });

    // Enter key in form triggers submit-lead
    document.addEventListener("keydown", e => {
      if (e.key === "Enter" && e.target.closest("#leadForm")) {
        e.preventDefault();
        const btn = document.querySelector('[data-action="submit-lead"]');
        if (btn) btn.click();
      }
    });

    // Logo click
    document.querySelector(".marks___logo").addEventListener("click", resetDemo);

    // ═══════════════════════════════════════
    // IMAGE GALLERY (pre-generation helper)
    // ═══════════════════════════════════════
    (function() {
      const btn = document.getElementById("marks___galleryBtn");
      const overlay = document.getElementById("marks___gallery");
      const closeBtn = document.getElementById("marks___galleryClose");
      const body = document.getElementById("marks___galleryBody");
      const countEl = document.getElementById("marks___galleryCount");

      function enc(s) { return encodeURIComponent(s); }

      function getAllImages() {
        const imgs = [];

        // Course cards (560x280)
        const coursePrompts = {
          "Análise e Desenvolvimento de Sistemas": "young developer coding on laptop at modern coworking space with purple ambient light",
          "Ciência de Dados": "data analyst looking at colorful dashboard charts on wide monitor in modern office",
          "Sistemas de Informação": "diverse team collaborating around digital whiteboard with system diagrams",
          "Ciência da Computação": "close up of code on dark screen with colorful syntax highlighting bokeh",
          "Processos Gerenciais": "young professional presenting project plan on tablet in bright modern meeting room",
          "Gestão Financeira": "business person reviewing financial charts on laptop in minimalist office",
          "Administração": "confident young professional in modern glass office building lobby",
          "Gestão Comercial": "dynamic sales team celebrating in modern startup office environment",
          "Gestão Hospitalar": "modern hospital corridor with warm ambient lighting and professional staff",
          "Saúde Digital": "healthcare professional using tablet with digital health interface in clinic",
          "Biomedicina": "laboratory technician using microscope in modern bright research lab",
          "Psicologia": "calm therapy room with soft natural light warm tones and plants",
          "Marketing Digital": "creative professional working on social media campaign on multiple screens",
          "Marketing": "marketing team brainstorming with colorful sticky notes on glass wall",
          "Design Digital": "designer creating UI mockup on large monitor with stylus tablet",
          "Publicidade e Propaganda": "creative studio with storyboards mood boards and warm lighting",
          "Design": "designer workspace with sketches color swatches and creative tools"
        };

        Object.entries(coursePrompts).forEach(function(entry) {
          [1, 2].forEach(function(seed) {
            imgs.push({
              cat: "Trilhas (" + entry[0] + ")",
              size: "560x280",
              url: "https://placeholdr.dev/560x280/" + enc(entry[1]) + "?style=photographic&seed=" + seed
            });
          });
        });

        // Lifestyle banners (960x320)
        var lifestylePrompts = {
          "Tech": "diverse young professionals at tech startup office with laptops warm natural light",
          "Business": "young professionals in modern corporate environment with city skyline view",
          "Health": "healthcare students in modern university campus with bright natural light",
          "Creative": "creative professionals collaborating in colorful design studio workspace"
        };

        Object.entries(lifestylePrompts).forEach(function(entry) {
          imgs.push({
            cat: "Lifestyle (" + entry[0] + ")",
            size: "960x320",
            url: "https://placeholdr.dev/960x320/" + enc(entry[1]) + "?style=photographic&seed=2"
          });
        });

        // CTA slides (1400x700)
        var ctaPrompts = {
          "Tech": [
            "aerial view modern city at night neon purple blue lights",
            "diverse young team collaborating at startup with laptops",
            "close up hands typing code on laptop warm bokeh background"
          ],
          "Business": [
            "modern glass skyscrapers reflecting golden sunset",
            "young professional presenting in bright conference room",
            "team celebrating success in modern office environment"
          ],
          "Health": [
            "bright modern university campus with students walking",
            "modern hospital with warm light and professional staff",
            "laboratory with natural light and modern equipment"
          ],
          "Creative": [
            "colorful creative studio warm ambient lighting",
            "designer working on digital mockup multiple monitors",
            "creative brainstorming session colorful sticky notes glass wall"
          ]
        };

        Object.entries(ctaPrompts).forEach(function(entry) {
          entry[1].forEach(function(prompt, i) {
            imgs.push({
              cat: "CTA Slide (" + entry[0] + ")",
              size: "1400x700",
              url: "https://placeholdr.dev/1400x700/" + enc(prompt) + "?style=photographic&seed=" + (i + 1)
            });
          });
        });

        return imgs;
      }

      function openGallery() {
        var imgs = getAllImages();
        countEl.textContent = imgs.length + " imagens no total — carregando todas para pré-gerar cache";

        var cats = {};
        imgs.forEach(function(img) {
          if (!cats[img.cat]) cats[img.cat] = [];
          cats[img.cat].push(img);
        });

        var html = "";
        Object.entries(cats).forEach(function(entry) {
          html += '<div style="margin-bottom:32px;">';
          html += '<div style="font-family:var(--font-maquina);font-size:0.68rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(247,248,252,0.4);margin-bottom:8px;">' + entry[0] + ' — ' + entry[1][0].size + '</div>';
          html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;">';
          entry[1].forEach(function(img) {
            html += '<div style="border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);">';
            html += '<img src="' + img.url + '" style="width:100%;display:block;" loading="eager" />';
            html += '<div style="padding:8px 10px;font-size:0.68rem;color:rgba(247,248,252,0.35);word-break:break-all;">' + img.url.replace("https://placeholdr.dev/", "") + '</div>';
            html += '</div>';
          });
          html += '</div></div>';
        });

        body.innerHTML = html;
        overlay.style.display = "block";
      }

      btn.addEventListener("click", openGallery);
      closeBtn.addEventListener("click", function() { overlay.style.display = "none"; });
    })();

    // Init
    render();
  </script>
</body>
</html>
